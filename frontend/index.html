<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PlantBase — Discover handcrafted plant-based products from local communities. Premium organic hair care, skin care, herbal supplements and more." />
    <title>PlantBase — Plant-Based Marketplace</title>
    <script>
      // Prevent flash of wrong theme — supports light/dark/nature
      (function() {
        const theme = localStorage.getItem('plantbase-theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        if (theme === 'nature') document.documentElement.classList.add('nature');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
